<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strømballetten</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a12;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #screen {
    position: relative;
    line-height: 0;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(96vw, calc(92vh * 4 / 3));
    aspect-ratio: 4 / 3;
    background: #000;
    box-shadow: 0 0 60px rgba(120, 200, 255, 0.22);
  }
  #crt {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 58%, rgba(0, 0, 0, 0.32) 100%),
      repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.16) 0px,
        rgba(0, 0, 0, 0.16) 1px,
        transparent 1px,
        transparent 3px
      );
  }
  #footer {
    color: #4a5568;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="screen">
  <canvas id="c" width="320" height="240"></canvas>
  <div id="crt"></div>
</div>
<div id="footer">STRØMBALLETTEN &mdash; inspirert av «Norsk sluttstrøm» (Uti vår hage)</div>
<script src="game.js"></script>
</body>
</html>
